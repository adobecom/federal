name: Rebuild global-navigation dist

# After a PR is merged into `main` or `stage`, the merge commit may contain a
# stale `dist/` (the `merge=ours` attribute in .gitattributes intentionally
# avoids blocking the merge on the giant minified blobs). This workflow
# rebuilds `dist/` from the merged source and, if it differs from what was
# committed, pushes a follow-up commit so the branch tip always carries an
# artifact that matches its source.
#
# Loop avoidance:
#   * `paths-ignore` skips runs triggered by changes confined to dist/.
#   * Pushes made with the default GITHUB_TOKEN do not trigger further
#     workflow runs, so the bot's own rebuild commit cannot re-trigger this
#     job. (See GitHub docs: "Triggering a workflow from a workflow".)

on:
  push:
    branches:
      - main
      - stage
    paths:
      - 'federal/libs/global-navigation/src/**'
      - 'federal/libs/global-navigation/build.js'
      - 'federal/libs/global-navigation/build-plugins/**'
      - 'federal/libs/global-navigation/package.json'
      - 'federal/libs/global-navigation/package-lock.json'
      - 'federal/libs/global-navigation/tsconfig.json'

concurrency:
  # Serialize per branch so two rapid merges can't race each other into a
  # non-fast-forward push.
  group: rebuild-dist-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rebuild-dist:
    runs-on: ubuntu-latest
    permissions:
      # Required for the bot to push the rebuilt dist back to the branch.
      contents: write
    defaults:
      run:
        working-directory: federal/libs/global-navigation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # We need write access via GITHUB_TOKEN for the push step below.
          persist-credentials: true
          # Fetch full ref so we can push a follow-up commit onto it.
          fetch-depth: 1
          # The `consonant` submodule supplies the design-token CSS files
          # imported by `src/styles/styles.css`. Without this the build fails
          # at the lightning-css @import resolution step. Using `true` (not
          # `recursive`) keeps the checkout to direct submodules only —
          # consonant has its own `milo` submodule we don't need.
          submodules: true

      - name: Verify build inputs are present
        # Fail fast with a clear message if anything the build relies on is
        # missing. Otherwise the user sees a confusing lightningcss ENOENT
        # buried inside esbuild's plugin output. Every check here corresponds
        # to a real failure we've hit in CI.
        run: |
          set -euo pipefail

          # 1) Direct submodules properly initialized. `git submodule status`
          #    prefixes uninitialized entries with `-` and out-of-sync entries
          #    with `+`; a clean line starts with a space. We deliberately do
          #    *not* recurse — consonant has its own (very large) `milo`
          #    submodule that we don't check out and don't need.
          bad_submodules=$(git -C "${GITHUB_WORKSPACE}" submodule status | grep -E '^[-+]' || true)
          if [ -n "$bad_submodules" ]; then
            echo "::error::One or more submodules are not properly checked out:"
            echo "$bad_submodules"
            exit 1
          fi

          # 2) The specific design-token files styles.css imports. If the
          #    consonant submodule's layout changes upstream this surfaces
          #    immediately instead of corrupting the bundle.
          required_files=(
            consonant/dist/packages/tokens/css/dev/tokens.primitives.css
            consonant/dist/packages/tokens/css/dev/tokens.semantic.css
            consonant/dist/packages/tokens/css/dev/tokens.semantic.light.css
            consonant/dist/packages/tokens/css/min/tokens.min.css
          )
          missing=0
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error file=federal/libs/global-navigation/$f::required build input missing"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

          echo "All build inputs present."

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
          cache-dependency-path: federal/libs/global-navigation/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit rebuilt dist if it changed
        run: |
          # `git diff --quiet` exits 0 when there is no change, 1 when there
          # is. We only push when the rebuild actually produced something
          # different from what the merge commit landed.
          if git diff --quiet -- dist/; then
            echo "dist/ matches the committed artifact — nothing to push."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "ci(global-navigation): rebuild dist for ${GITHUB_SHA::7}"
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"
