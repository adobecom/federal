name: merge_to_stage

on:
  pull_request:
    branches:
      - stage
      - feds
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:
    branches:
      - stage

concurrency:
  group: merge-to-stage-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test-root:
    if: github.event.pull_request.draft == false || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint root project
        run: npm run lint

      - name: Test root project
        run: npm test

  lint-and-test-global-navigation:
    if: github.event.pull_request.draft == false || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: federal/libs/global-navigation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
          cache-dependency-path: federal/libs/global-navigation/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint global navigation
        run: npm run lint

      - name: Test global navigation
        run: npm test
